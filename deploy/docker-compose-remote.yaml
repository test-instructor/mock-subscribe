# ============================================
# 远程部署 docker-compose 配置文件
# 使用阿里云镜像仓库，一键部署
# ============================================
#
# 使用方式:
#   docker-compose -f docker-compose-remote.yaml up -d
#
# 端口映射:
#   - 前端: 18080 -> 8080
#   - 后端: 18888 -> 8888
#   - MySQL: 13306 -> 3306
#   - Redis: 16379 -> 6379
#
# 网络说明:
#   - 所有容器在同一网络中，使用容器名通信
#   - 后端地址: http://server:8888
#   - MySQL 地址: mysql:3306
#   - Redis 地址: redis:6379
#

version: "3"

networks:
  mock-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 177.7.0.0/16

services:

  # ============================================
  # 后端服务 (Go)
  # ============================================
  server:
    image: registry.cn-hangzhou.aliyuncs.com/kk-mock/server:latest
    container_name: mock-server
    restart: always
    ports:
      - "18888:8888"
    environment:
      # 时区设置
      TZ: Asia/Shanghai
    # 注意: 配置文件 config.docker.yaml 已内置在镜像中
    # 如需覆盖配置，可通过环境变量或挂载方式
    networks:
      mock-network:
        ipv4_address: 177.7.0.12

  # ============================================
  # 前端服务 (Nginx + Vue)
  # ============================================
  web:
    image: registry.cn-hangzhou.aliyuncs.com/kk-mock/web:latest
    container_name: mock-web
    restart: always
    ports:
      - "18080:8080"
    depends_on:
      - server
    networks:
      mock-network:
        ipv4_address: 177.7.0.11
